name: Publish Mod

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build mod
        run: ./gradlew build

      - name: Upload to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: reshaped
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            
          name: ReShaped ${{ github.ref_name }}
          version: ${{ github.ref_name }}

          loaders: fabric
          game-versions: 1.20.1

          dependencies: |
            fabric-api(required){modrinth:fabric-api}
            cloth-config(required){modrinth:cloth-config}
            modmenu(optional){modrinth:modmenu}

          changelog: ${{ github.event.release.body }}

      - name: Upload to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1463309
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
  
          name: ReShaped ${{ github.ref_name }}
          version: ${{ github.ref_name }}

          loaders: fabric
          game-versions: 1.20.1

          dependencies: |
            fabric-api(required){curseforge:306612}
            cloth-config(required){curseforge:348521}
            modmenu(optional){curseforge:308702}
            
          changelog: ${{ github.event.release.body }}
