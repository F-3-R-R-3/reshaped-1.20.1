name: Publish Mod

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build

      # --- Modrinth upload ---
      - name: Upload to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: reshaped
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/reshaped-${{ github.ref_name }}.jar
          name: ReShaped ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          modrinth-loaders: fabric
          modrinth-game-versions: 1.20,1.20.1,1.20.2,1.20.3,1.20.4,1.20.5,1.20.6
          modrinth-version-type: alpha
          modrinth-dependencies: |
            fabric-api(required){modrinth:fabric-api;side:client,server}
            cloth-config(required){modrinth:cloth-config;side:client,server}
            modmenu(optional){modrinth:modmenu;side:client,server}
          modrinth-changelog: ${{ github.event.release.body }}

      # --- CurseForge upload ---
      - name: Upload to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1463309
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/reshaped-${{ github.ref_name }}.jar
          name: ReShaped ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          loaders: fabric
          game-versions: 1.20,1.20.1,1.20.2,1.20.3,1.20.4,1.20.5,1.20.6
          version-type: alpha
          curseforge-side: client,server
          curseforge-dependencies: |
            fabric-api(required){curseforge:306612}
            cloth-config(required){curseforge:348521}
            modmenu(optional){curseforge:308702}
          curseforge-changelog: ${{ github.event.release.body }}
