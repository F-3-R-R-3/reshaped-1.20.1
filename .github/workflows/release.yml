name: Publish Mod

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build -Pmod_version=${{ github.ref_name }}

      # --- upload ---
      - name: Upload to Modrinth and CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # ---Modrinth settings ---
          modrinth-id: reshaped
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- Curseforge settings ---
          curseforge-id: 1463309
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- Common settings ---
          files: build/libs/reshaped-${{ github.ref_name }}.jar
          changelog: ${{ github.event.release.body }}
