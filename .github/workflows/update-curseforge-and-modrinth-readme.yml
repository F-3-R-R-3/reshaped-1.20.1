name: Update Modrinth + CurseForge README

on:
  push:
    paths:
      - README.md
    branches:
      - master

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read README.md
        id: readme
        run: |
          README_CONTENT=$(jq -Rs . < README.md)
          echo "README_CONTENT=$README_CONTENT" >> $GITHUB_ENV

      - name: Update Modrinth description
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          curl -X PATCH "https://api.modrinth.com/v2/project/reshaped" \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $README_CONTENT}"
